testCases:
  - name: "status-no-changes"
    description: "Clean workspace shows 0 changes via CLI and MCP"
    setup:
      - id: init
        command: init-workspace
        input:
          repos:
            - name: repo-a
              managedFiles:
                - go.mod
                - go.sum
          compoName: "test-compo"

    steps:
      - id: cli-status
        mode: cli
        command: status
        input:
          cu-repo-path: "{{.CURepoPath}}"
        expected:
          exitCode: 0

      - id: mcp-status
        mode: mcp
        tool: cu-status
        input:
          cuRepoPath: "{{.CURepoPath}}"
        expected:
          changes:
            length: 0

    teardown: []
